# FIX-INFRA-01: CI/CD Pipeline
# Runs on every push to main/staging and every PR targeting those branches.
# Three sequential gates: lint → typecheck → test
# Branch protection on main should require this workflow to pass before merge.

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install missing optional native dep
        # npm bug: @rollup/rollup-linux-x64-gnu (required by vitest) is skipped
        # when installing from a cached ~/.npm. Explicitly install it.
        # https://github.com/npm/cli/issues/4828
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.60.4

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
        env:
          # Provide dummy env vars for unit tests (mocked — no real connections)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_that_is_long_enough
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key_long_enough_xxx
          NEXTAUTH_SECRET: placeholder_nextauth_secret_must_be_32chars_x
          NEXTAUTH_URL: https://localhost:3000
          GOOGLE_CLIENT_ID: placeholder_google_client_id
          GOOGLE_CLIENT_SECRET: placeholder_google_client_secret
          RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: placeholder_razorpay_secret
          RAZORPAY_WEBHOOK_SECRET: placeholder_webhook_secret
          RESEND_API_KEY: re_placeholder_resend_key
          ADMIN_EMAIL: admin@placeholder.com

  deploy:
    name: Deploy to Cloudflare Pages
    needs: [quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Cloudflare build tools
        run: npm install --no-save @opennextjs/cloudflare@latest wrangler@latest

      - name: Build for Cloudflare Pages
        run: npx @opennextjs/cloudflare@latest
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next/assets --project-name=possah-website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
