<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56" role="img" aria-label="The Possah">
  <!-- Wordmark for dark backgrounds (Razorpay modal, dark navbars) -->
  <!-- "THE" small caps above, "POSSAH" large — ivory on transparent -->
  <text
    x="120"
    y="18"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="400"
    letter-spacing="5"
    text-anchor="middle"
    fill="#F4ECDF"
    opacity="0.75"
  >THE</text>
  <text
    x="120"
    y="48"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="700"
    letter-spacing="6"
    text-anchor="middle"
    fill="#F4ECDF"
  >POSSAH</text>
</svg>
